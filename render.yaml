services:
    - type: web
      name: trunal-backend
      env: node
      plan: free
      buildCommand: npm install && npm run build
      startCommand: npx prisma migrate deploy && npm start
      envVars:
          - key: PORT
            value: 4001
          - key: NODE_ENV
            value: production
          - key: DATABASE_URL
            sync: false
          - key: JWT_SECRET
            sync: false
          - key: FRONTEND_URL
            sync: false
      autoDeploy: false
